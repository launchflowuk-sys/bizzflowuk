# This file is processed by envsubst at container startup.
# Only ${API_UPSTREAM} is substituted — nginx's own $variables are left intact.
# Default: API_UPSTREAM=bizzflowuk-api:8080 (works with docker-compose stack)
# Override for separate deployments: API_UPSTREAM=your-api-hostname:8080
# Deliberately not "api" — a generic service name collides with other
# projects on the same shared Docker network (see docker-compose.yml).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — resolves service names at request time, not startup.
    # Without this, nginx crashes if the upstream container isn't ready when nginx starts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # Aggressive caching for fingerprinted assets (Vite adds content hashes)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # /sitemap.xml and /robots.txt must live at the domain root for Google
    # Search Console, but their content is per-tenant and DB-driven (the
    # Sitemap: line needs each tenant's own domain) — rewrite both to the
    # API's generator routes rather than serving static files from this build.
    location = /sitemap.xml {
        set $api_upstream http://${API_UPSTREAM};
        proxy_pass $api_upstream/api/public/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /robots.txt {
        set $api_upstream http://${API_UPSTREAM};
        proxy_pass $api_upstream/api/public/robots.txt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy /api and /api/* to the API service.
    # Using a variable forces nginx to resolve the hostname per-request via the
    # resolver above, rather than at startup (which fails if api isn't up yet).
    location /api {
        set $api_upstream http://${API_UPSTREAM};
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Exact root needs its own location: try_files' directory-existence check (used by the
    # general location below) always succeeds for "/" itself, since the doc root directory
    # always exists — that would silently skip the render attempt for the home page specifically
    # and serve the static shell directly even for a real tenant. This block proxies straight to
    # the render route with no try_files step so that shortcut can't apply here.
    #
    # Confirmed by direct testing (real nginx container, real static files, real API, both the
    # success case and the exact Docker healthcheck command) before this went anywhere near
    # production: a plain prefix location combined directly with error_page/proxy_intercept_errors
    # silently fails to fall back at all — that's what broke the first attempt at this cutover,
    # since Docker's healthcheck hits exactly "/" with no matching Host. Routing everything other
    # than the exact root through a named location (@render below) instead of a second plain
    # prefix location avoids that failure mode.
    location = / {
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
        set $api_upstream http://${API_UPSTREAM};
        proxy_pass $api_upstream/api/render$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Every other path: try a real static file first (covers direct hits on non-fingerprinted
    # files in public/), then the render route via the named @render location.
    location / {
        try_files $uri $uri/ @render;
    }

    location @render {
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
        set $api_upstream http://${API_UPSTREAM};
        proxy_pass $api_upstream/api/render$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — reached when the render route doesn't recognize the host or path. This is
    # the exact same behavior this app had before the render route existed at all.
    location @spa_fallback {
        try_files $uri $uri/ /index.html;
    }
}
