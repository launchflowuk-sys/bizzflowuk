services:

  # Named "bizzflowuk-api", not "api": on the shared external "coolify"
  # network, Docker Compose auto-registers the service name as a DNS alias —
  # a generic "api" collides with any other project on the same host that
  # also names its backend service "api" (confirmed live: `nslookup api`
  # from the web container returned two different IPs, ours and another
  # project's, and nginx's resolver would nondeterministically pick either —
  # causing intermittent requests to be silently routed to a different app).
  bizzflowuk-api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile.server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      PRIVATE_UPLOAD_DIR: /data/uploads
      # Only used for the one-time platform-admin bootstrap (see seedFix.ts) —
      # safe to remove from the environment after first successful deploy.
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      # One-time password recovery for mark@amorendering.co.uk. Set it in Coolify, deploy, log in,
      # then remove it. Passed to the runtime container so the seed can reset the password.
      MARK_LOGIN_PASSWORD: ${MARK_LOGIN_PASSWORD:-}
    volumes:
      - api-uploads:/data/uploads
    networks:
      - app-net
      - coolify

  web:
    build:
      context: .
      dockerfile: artifacts/web/Dockerfile.web
      args:
        PORT: 3000
        BASE_PATH: /
    restart: unless-stopped
    environment:
      API_UPSTREAM: bizzflowuk-api:8080
      SERVICE_FQDN_WEB_80:
    depends_on:
      - bizzflowuk-api
    networks:
      - app-net
      - coolify

networks:
  app-net:
    driver: bridge
  coolify:
    external: true

volumes:
  api-uploads:
