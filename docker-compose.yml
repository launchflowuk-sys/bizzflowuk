services:

  # ---------------------------------------------------------------------------
  # PostgreSQL database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: launchflow
      POSTGRES_USER: launchflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchflow -d launchflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  # ---------------------------------------------------------------------------
  # API server (Express + Drizzle)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile.server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://launchflow:${POSTGRES_PASSWORD}@db:5432/launchflow
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?CLERK_SECRET_KEY is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net

  # ---------------------------------------------------------------------------
  # Web frontend (Vite static build served by nginx)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: artifacts/web/Dockerfile.web
      args:
        PORT: 3000
        BASE_PATH: /
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:?VITE_CLERK_PUBLISHABLE_KEY is required}
        VITE_CLERK_PROXY_URL: ${VITE_CLERK_PROXY_URL:-}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-net

volumes:
  postgres_data:

networks:
  app-net:
    driver: bridge
