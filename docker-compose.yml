services:

  # ---------------------------------------------------------------------------
  # PostgreSQL database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: launchflow
      POSTGRES_USER: launchflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchflow -d launchflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  # ---------------------------------------------------------------------------
  # API server (Express + Drizzle)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile.server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://launchflow:${POSTGRES_PASSWORD}@db:5432/launchflow
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      DEFAULT_OBJECT_STORAGE_BUCKET_ID: ${DEFAULT_OBJECT_STORAGE_BUCKET_ID:-}
      PRIVATE_OBJECT_DIR: ${PRIVATE_OBJECT_DIR:-}
      PUBLIC_OBJECT_SEARCH_PATHS: ${PUBLIC_OBJECT_SEARCH_PATHS:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/healthz',(r)=>r.statusCode===200?process.exit(0):process.exit(1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - app-net

  # ---------------------------------------------------------------------------
  # Web frontend (Vite static build served by nginx)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: artifacts/web/Dockerfile.web
      args:
        PORT: 3000
        BASE_PATH: /
    restart: unless-stopped
    environment:
      API_UPSTREAM: api:8080
      SERVICE_FQDN_WEB_80:
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-net

volumes:
  postgres_data:

networks:
  app-net:
    driver: bridge
