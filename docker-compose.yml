services:

  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile.server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      PRIVATE_UPLOAD_DIR: /data/uploads
      # Only used for the one-time platform-admin bootstrap (see seedFix.ts) —
      # safe to remove from the environment after first successful deploy.
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    volumes:
      - api-uploads:/data/uploads
    networks:
      - app-net
      - coolify

  web:
    build:
      context: .
      dockerfile: artifacts/web/Dockerfile.web
      args:
        PORT: 3000
        BASE_PATH: /
    restart: unless-stopped
    environment:
      API_UPSTREAM: api:8080
      SERVICE_FQDN_WEB_80:
    depends_on:
      - api
    networks:
      - app-net
      - coolify

networks:
  app-net:
    driver: bridge
  coolify:
    external: true

volumes:
  api-uploads:
