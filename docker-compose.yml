services:

  # ---------------------------------------------------------------------------
  # PostgreSQL database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: launchflow
      POSTGRES_USER: launchflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchflow -d launchflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # API server (Express + Drizzle)
  # Runs migrations then starts on port 8080
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile.server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://launchflow:${POSTGRES_PASSWORD}@db:5432/launchflow
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?CLERK_SECRET_KEY is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Web frontend (Vite static build served by nginx)
  # No host port binding — Coolify's Traefik handles external traffic.
  # Container must be on the `coolify` network so Traefik can reach it.
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: artifacts/web/Dockerfile.web
      args:
        PORT: 3000
        BASE_PATH: /
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:?VITE_CLERK_PUBLISHABLE_KEY is required}
        VITE_CLERK_PROXY_URL: ${VITE_CLERK_PROXY_URL:-}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
      - coolify
    labels:
      - "traefik.enable=true"
      # HTTP router — redirects to HTTPS
      - "traefik.http.routers.bizflow-web-http.rule=Host(`${COOLIFY_FQDN:-localhost}`)"
      - "traefik.http.routers.bizflow-web-http.entrypoints=http"
      - "traefik.http.routers.bizflow-web-http.middlewares=bizflow-https-redirect"
      - "traefik.http.middlewares.bizflow-https-redirect.redirectscheme.scheme=https"
      # HTTPS router — serves traffic
      - "traefik.http.routers.bizflow-web-https.rule=Host(`${COOLIFY_FQDN:-localhost}`)"
      - "traefik.http.routers.bizflow-web-https.entrypoints=https"
      - "traefik.http.routers.bizflow-web-https.tls=true"
      - "traefik.http.routers.bizflow-web-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.bizflow-web.loadbalancer.server.port=80"
      - "traefik.docker.network=coolify"

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
  coolify:
    external: true
