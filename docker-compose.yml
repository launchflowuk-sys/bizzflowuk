services:

  # ---------------------------------------------------------------------------
  # API server (Express + Drizzle)
  # DATABASE_URL is injected by Coolify when the managed Postgres is linked.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile.server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      DEFAULT_OBJECT_STORAGE_BUCKET_ID: ${DEFAULT_OBJECT_STORAGE_BUCKET_ID:-}
      PRIVATE_OBJECT_DIR: ${PRIVATE_OBJECT_DIR:-}
      PUBLIC_OBJECT_SEARCH_PATHS: ${PUBLIC_OBJECT_SEARCH_PATHS:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/healthz',(r)=>r.statusCode===200?process.exit(0):process.exit(1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 5
    networks:
      - app-net
      - coolify

  # ---------------------------------------------------------------------------
  # Web frontend (Vite static build served by nginx)
  # SERVICE_FQDN_WEB_80 is a Coolify magic variable that assigns the domain.
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: artifacts/web/Dockerfile.web
      args:
        PORT: 3000
        BASE_PATH: /
    restart: unless-stopped
    environment:
      API_UPSTREAM: api:8080
      SERVICE_FQDN_WEB_80:
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-net
      - coolify

networks:
  app-net:
    driver: bridge
  coolify:
    external: true
