services:

  # ---------------------------------------------------------------------------
  # PostgreSQL database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: launchflow
      POSTGRES_USER: launchflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchflow -d launchflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # API server (Express + Drizzle)
  # Runs migrations then starts on port 8080
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile.server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://launchflow:${POSTGRES_PASSWORD}@db:5432/launchflow
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?CLERK_SECRET_KEY is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    # No host port mapping — API is internal only; all traffic routes through
    # the web nginx container which proxies /api/ to http://api:8080.

  # ---------------------------------------------------------------------------
  # Web frontend (Vite static build served by nginx)
  # nginx proxies /api/ (including /api/__clerk Clerk proxy) to the api service
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: artifacts/web/Dockerfile.web
      args:
        PORT: 3000
        BASE_PATH: /
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:?VITE_CLERK_PUBLISHABLE_KEY is required}
        VITE_CLERK_PROXY_URL: ${VITE_CLERK_PROXY_URL:-}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
