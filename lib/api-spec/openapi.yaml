    post:
      operationId: createVisualiserRequest
      tags: [visualiser]
      summary: Submit a visualiser request (public or authenticated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisualiserRequestInput"
      responses:
        "201":
          description: Created request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisualiserRequest"

  /visualiser/{id}:
    get:
      operationId: getVisualiserRequest
      tags: [visualiser]
      summary: Get visualiser request by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Visualiser request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisualiserRequest"
    delete:
      operationId: deleteVisualiserRequest
      tags: [visualiser]
      summary: Delete visualiser request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Contact ──────────────────────────────────────────────────────────────
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit a contact message (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactMessageInput"
      responses:
        "201":
          description: Message submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessage"

  /contact/messages:
    get:
      operationId: listContactMessages
      tags: [contact]
      summary: List contact messages for current tenant
      responses:
        "200":
          description: Contact messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactMessage"

  /contact/messages/{id}:
    get:
      operationId: getContactMessage
      tags: [contact]
      summary: Get contact message by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessage"
    delete:
      operationId: deleteContactMessage
      tags: [contact]
      summary: Delete contact message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Quote Requests (public lead form)
  /quote-request:
    post:
      operationId: submitQuoteRequest
      tags: [leads]
      summary: Submit a public quote request (creates lead)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteRequestInput"
      responses:
        "201":
          description: Lead created from quote request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  # ─── Public payment links (Square) ──────────────────────────────────────────
  /public/pay/{token}:
    get:
      operationId: getPublicPaymentPage
      tags: [payments]
      summary: Fetch quote + payment link details for the public payment page
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment page data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicPaymentPageData"

  /public/pay/{token}/charge:
    post:
      operationId: chargePublicPaymentLink
