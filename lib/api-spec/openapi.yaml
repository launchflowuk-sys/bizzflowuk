openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: LaunchFlow multi-tenant SaaS platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and current user
  - name: tenants
    description: Tenant management (super admin)
  - name: leads
    description: Lead CRM
  - name: quotes
    description: Quote management
  - name: projects
    description: Project management
  - name: customers
    description: Customer management
  - name: services
    description: Service page management
  - name: areas
    description: Area page management
  - name: gallery
    description: Gallery image management
  - name: before-after
    description: Before and after transformations
  - name: reviews
    description: Review management
  - name: case-studies
    description: Case study management
  - name: faqs
    description: FAQ management
  - name: blog
    description: Blog post management
  - name: visualiser
    description: Visualiser request management
  - name: contact
    description: Contact messages
  - name: team
    description: Team member management
  - name: emails
    description: Dashboard email composer and sent-email log
  - name: settings
    description: Tenant settings
  - name: dashboard
    description: Dashboard analytics
  - name: storage
    description: Object storage upload and serving endpoints

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Auth ────────────────────────────────────────────────────────────────
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthenticated

  /auth/avatar:
    post:
      operationId: setAvatar
      tags: [auth]
      summary: Set the current user's avatar image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetAvatarInput"
      responses:
        "200":
          description: Avatar updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetAvatarInput"

  /auth/switch-tenant:
    post:
      operationId: switchTenant
      tags: [auth]
      summary: Switch the caller's active business
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchTenantInput"
      responses:
        "200":
          description: Active business switched; returns the updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          description: User is not a member of that business

  /auth/sync:
    post:
      operationId: syncUser
      tags: [auth]
      summary: Sync Clerk user to database (called after sign-in)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSync"
      responses:
        "200":
          description: User synced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ─── Admin Users ──────────────────────────────────────────────────────────
  /admin/users:
    get:
      operationId: listUsers
      tags: [auth]
      summary: List all users (super admin)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/users/{id}:
    patch:
      operationId: updateUser
      tags: [auth]
      summary: Update user role and tenant assignment (super admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ─── Tenants ─────────────────────────────────────────────────────────────
  /tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      summary: List all tenants (super admin)
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tenant"
    post:
      operationId: createTenant
      tags: [tenants]
      summary: Create a new tenant (super admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantInput"
      responses:
        "201":
          description: Created tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /tenants/{id}:
    get:
      operationId: getTenant
      tags: [tenants]
      summary: Get tenant by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    patch:
      operationId: updateTenant
      tags: [tenants]
      summary: Update tenant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantUpdate"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    delete:
      operationId: deleteTenant
      tags: [tenants]
      summary: Delete tenant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tenants/{id}/suspend:
    patch:
      operationId: suspendTenant
      tags: [tenants]
      summary: Suspend or unsuspend a tenant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantSuspend"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /tenants/{id}/stats:
    get:
      operationId: getTenantStats
      tags: [tenants]
      summary: Get stats for a specific tenant (super admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantStats"

  /platform/stats:
    get:
      operationId: getPlatformStats
      tags: [tenants]
      summary: Get platform-wide stats (super admin)
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  # ─── Public tenant site data ──────────────────────────────────────────────
  /public/{tenantSlug}/site:
    get:
      operationId: getPublicSite
      tags: [tenants]
      summary: Get public site data for a tenant (homepage, settings, etc.)
      parameters:
        - name: tenantSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public site data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicSiteData"

  /public/resolve-domain:
    get:
      operationId: resolveTenantDomain
      tags: [tenants]
      summary: Resolve a custom domain to a tenant slug
      parameters:
        - name: host
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resolved tenant slug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainResolution"
        "404":
          description: Domain not found

  # ─── Leads ───────────────────────────────────────────────────────────────
  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List leads for current tenant
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: assignedTo
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Created lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get lead by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUpdate"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /leads/{id}/notes:
    get:
      operationId: listLeadNotes
      tags: [leads]
      summary: List notes for a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadNote"
    post:
      operationId: createLeadNote
      tags: [leads]
      summary: Add note to lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadNoteInput"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadNote"

  /leads/{id}/convert-quote:
    post:
      operationId: convertLeadToQuote
      tags: [leads]
      summary: Convert lead to quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Created quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /leads/{id}/convert-project:
    post:
      operationId: convertLeadToProject
      tags: [leads]
      summary: Convert lead to project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  # ─── Quotes ───────────────────────────────────────────────────────────────
  /quotes:
    get:
      operationId: listQuotes
      tags: [quotes]
      summary: List quotes for current tenant
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quote"
    post:
      operationId: createQuote
      tags: [quotes]
      summary: Create a quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteInput"
      responses:
        "201":
          description: Created quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{id}:
    get:
      operationId: getQuote
      tags: [quotes]
      summary: Get quote by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
    patch:
      operationId: updateQuote
      tags: [quotes]
      summary: Update quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteUpdate"
      responses:
        "200":
          description: Updated quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
    delete:
      operationId: deleteQuote
      tags: [quotes]
      summary: Delete quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /quotes/{id}/convert-project:
    post:
      operationId: convertQuoteToProject
      tags: [quotes]
      summary: Convert accepted quote to project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /quotes/{id}/items:
    get:
      operationId: listQuoteItems
      tags: [quotes]
      summary: List items for a quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quote items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuoteItem"
    post:
      operationId: createQuoteItem
      tags: [quotes]
      summary: Add item to quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteItemInput"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteItem"

  /quotes/{id}/payment-links:
    get:
      operationId: listQuotePaymentLinks
      tags: [quotes]
      summary: List payment links for a quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentLink"
    post:
      operationId: createQuotePaymentLink
      tags: [quotes]
      summary: Generate a payment link for a quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentLinkInput"
      responses:
        "201":
          description: Created payment link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentLink"

  /payment-links:
    get:
      operationId: listPaymentLinks
      tags: [quotes]
      summary: List all payment links for the current tenant (quote-linked and standalone)
      responses:
        "200":
          description: Payment links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentLink"
    post:
      operationId: createStandalonePaymentLink
      tags: [quotes]
      summary: Create a standalone payment link (no quote — e.g. a phone sale)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentLinkInput"
      responses:
        "201":
          description: Created payment link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentLink"

  /payment-links/{id}:
    delete:
      operationId: deletePaymentLink
      tags: [quotes]
      summary: Delete a payment link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /payment-links/{id}/send:
    post:
      operationId: sendPaymentLink
      tags: [quotes]
      summary: Email the customer a payment link (quote-linked or standalone)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sent payment link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentLink"

  /emails:
    get:
      operationId: listSentEmails
      tags: [emails]
      summary: List emails sent from the dashboard composer for the current tenant
      responses:
        "200":
          description: Sent emails
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SentEmail"

  /emails/compose:
    post:
      operationId: composeEmail
      tags: [emails]
      summary: Compose and send a branded email to a lead or customer, and log it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SentEmailInput"
      responses:
        "201":
          description: Logged sent email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SentEmail"

  /sms/send:
    post:
      operationId: sendSms
      tags: [emails]
      summary: Send a one-off SMS to a customer using the tenant's Twilio credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendSmsInput"
      responses:
        "200":
          description: SMS sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmsSendResult"

  /quote-items/{id}:
    patch:
      operationId: updateQuoteItem
      tags: [quotes]
      summary: Update quote item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteItemUpdate"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteItem"
    delete:
      operationId: deleteQuoteItem
      tags: [quotes]
      summary: Delete quote item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Projects ─────────────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects for current tenant
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{id}/updates:
    get:
      operationId: listProjectUpdates
      tags: [projects]
      summary: List updates for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project updates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectUpdate"
    post:
      operationId: createProjectUpdate
      tags: [projects]
      summary: Add update to project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdateInput"
      responses:
        "201":
          description: Created update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectUpdate"

  # ─── Customers ────────────────────────────────────────────────────────────
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers for current tenant
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Customer portal
  /portal/me:
    get:
      operationId: getPortalMe
      tags: [customers]
      summary: Get current customer portal data
      responses:
        "200":
