  # ─── Storage ──────────────────────────────────────────────────────────────
  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /dashboard/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestDashboardUploadUrl
      summary: Request an upload URL scoped to the current authenticated tenant (e.g. email attachments)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DashboardUploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/public-objects/{filePath}:
    get:
      tags: [storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content.
          content:
            "*/*":
              schema:
                type: string
                format: binary

  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve a private object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content.
          content:
            "*/*":
              schema:
                type: string
                format: binary

components:
  schemas:
    # ─── Shared ───────────────────────────────────────────────────────────
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    UploadUrlRequest:
      type: object
      required: [tenantSlug, name, size, contentType]
      properties:
        tenantSlug:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
          maximum: 10485760
        contentType:
          type: string
          enum: [image/jpeg, image/png, image/webp, image/gif, image/heic, image/heif, application/pdf, application/msword, application/vnd.openxmlformats-officedocument.wordprocessingml.document]

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          description: A same-origin PUT target — a relative path, not necessarily an absolute URL.
        objectPath:
          type: string
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"

    DashboardUploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
          maximum: 10485760
        contentType:
          type: string
          enum: [image/jpeg, image/png, image/webp, image/gif, image/heic, image/heif, application/pdf, application/msword, application/vnd.openxmlformats-officedocument.wordprocessingml.document]

    # ─── Auth / User ──────────────────────────────────────────────────────
    User:
      type: object
      required: [id, clerkId, email, role]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: string
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        role:
          type: string
          enum: [SUPER_ADMIN, TENANT_ADMIN, STAFF, CUSTOMER]
        tenantId:
          type: ["integer", "null"]
        avatarUrl:
          type: ["string", "null"]
        businesses:
          type: array
          description: Businesses this user can access (for the dashboard switcher). One entry = no switcher.
          items:
            $ref: "#/components/schemas/UserBusiness"
        createdAt:
          type: string
          format: date-time

    UserBusiness:
      type: object
      required: [tenantId, name, slug, role]
      properties:
        tenantId:
          type: integer
        name:
          type: string
        slug:
          type: string
        role:
          type: string
        primaryColor:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]

    SetAvatarInput:
      type: object
      properties:
        avatarUrl:
          type: ["string", "null"]

    SendSmsInput:
      type: object
      required: [to, body]
      properties:
        to:
          type: string
        body:
          type: string

    SmsSendResult:
      type: object
      properties:
        ok:
          type: boolean

    SwitchTenantInput:
      type: object
      required: [tenantId]
      properties:
        tenantId:
          type: integer

    UserSync:
      type: object
      required: [clerkId, email]
      properties:
        clerkId:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        tenantSlug:
          type: string

    UserUpdate:
      type: object
      properties:
        role:
          type: string
          enum: [SUPER_ADMIN, TENANT_ADMIN, STAFF, CUSTOMER]
        tenantId:
          type: ["integer", "null"]

    DomainResolution:
      type: object
      required: [slug]
      properties:
        slug:
          type: string

    # ─── Tenant ───────────────────────────────────────────────────────────
    Tenant:
      type: object
      required: [id, name, slug, businessType, status]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        businessType:
          type: string
        customDomain:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        adminEmail:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        primaryColor:
          type: ["string", "null"]
        secondaryColor:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, suspended]
        plan:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    TenantInput:
      type: object
      required: [name, slug, businessType]
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        businessType:
          type: string
        customDomain:
          type: string
        phone:
          type: string
        email:
          type: string
        adminEmail:
          type: string
        address:
          type: string
        primaryColor:
          type: string
        secondaryColor:
          type: string
        plan:
          type: string

    TenantUpdate:
      type: object
      properties:
        name:
          type: string
        businessType:
          type: string
        customDomain:
          type: string
        phone:
          type: string
        email:
