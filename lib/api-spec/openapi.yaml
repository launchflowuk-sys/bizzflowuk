      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/pipeline:
    get:
      operationId: getLeadPipeline
      tags: [dashboard]
      summary: Get lead pipeline breakdown by status
      responses:
        "200":
          description: Pipeline data
