      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicQuoteActionRequest"
      responses:
        "200":
          description: Updated quote status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  # ─── Team ─────────────────────────────────────────────────────────────────
  /team:
    get:
      operationId: listTeamMembers
      tags: [team]
      summary: List team members for current tenant
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
    post:
      operationId: createTeamMember
      tags: [team]
      summary: Create a team member / invite staff
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberInput"
      responses:
        "201":
          description: Created team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /team/{id}:
    get:
      operationId: getTeamMember
      tags: [team]
      summary: Get team member by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
    patch:
      operationId: updateTeamMember
      tags: [team]
      summary: Update team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberUpdate"
      responses:
        "200":
          description: Updated team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
    delete:
      operationId: deleteTeamMember
      tags: [team]
      summary: Remove team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Settings ─────────────────────────────────────────────────────────────
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get tenant settings for current tenant
      responses:
        "200":
          description: Tenant settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantSettings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update tenant settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantSettings"

  /settings/test-email:
    post:
      operationId: testEmailSettings
      tags: [settings]
      summary: Send a test email using the tenant's SMTP configuration
      responses:
