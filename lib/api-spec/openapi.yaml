      summary: Charge a Square card nonce against a payment link
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SquareChargeRequest"
      responses:
        "200":
          description: Charge result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SquareChargeResponse"

  /public/pay/{token}/action:
    post:
      operationId: submitPublicQuoteAction
      tags: [payments]
